name: Update Profile README

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  push:
    branches:
      - master
    paths:
      - 'profile/README.md'
      - 'scripts/update-profile.sh'
      - '.github/workflows/update-profile.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: read

concurrency:
  group: update-profile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-profile:
    name: Regenerate projects dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run update script
        env:
          # Provide a dedicated fine-grained read-only token (or GitHub App
          # installation token) limited to the specific repositories needed
          # by this workflow to list repositories and query their metadata.
          # Do not use a broad classic PAT with `repo` scope.
          # Fall back to GITHUB_TOKEN for public-only access.
          GITHUB_TOKEN: ${{ secrets.PROFILE_METADATA_READ_TOKEN || secrets.GITHUB_TOKEN }}
          # Only include private repositories when the INCLUDE_PRIVATE_REPOS
          # repository variable is explicitly set to '1' AND the dedicated
          # metadata token is configured. This decouples token availability
          # from private-repo inclusion to prevent accidentally publishing
          # private repository names in a public profile README.
          INCLUDE_PRIVATE: ${{ vars.INCLUDE_PRIVATE_REPOS == '1' && secrets.PROFILE_METADATA_READ_TOKEN != '' && '1' || '0' }}
        run: bash scripts/update-profile.sh

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update profile README [skip ci]"
            git pull --rebase origin master
            git push
          fi
