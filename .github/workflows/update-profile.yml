name: Update Profile README

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  push:
    branches:
      - master
    paths:
      - 'profile/README.md'
      - 'scripts/update-profile.sh'
      - '.github/workflows/update-profile.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: read

concurrency:
  group: update-profile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-profile:
    name: Regenerate projects dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run update script
        env:
          # A PAT with read:org and repo scopes is required to list private
          # repositories and search their issues/pull requests.
          # Fall back to GITHUB_TOKEN for public-only access.
          GITHUB_TOKEN: ${{ secrets.ORG_READ_PAT || secrets.GITHUB_TOKEN }}
        run: bash scripts/update-profile.sh

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update profile README [skip ci]"
            git pull --rebase origin master
            git push
          fi
